name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Smoke-test the CLI (static, animated, gallery)
        run: |
          python -m starweave "ci smoke" --out /tmp/poster.svg
          python -m starweave "ci smoke" --animate --out /tmp/anim.svg
          python -m starweave "ci smoke" --gallery 4 --out /tmp/gallery.html
          python -m starweave "ci smoke" --describe
          python - <<'PY'
          import xml.dom.minidom as m
          for f in ("/tmp/poster.svg", "/tmp/anim.svg"):
              m.parse(f)  # fail the build if the SVG is malformed
          print("svg well-formed")
          PY
